<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Currency Converter Homework</title>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Currency Converter</h1>
        <p>Convert between currencies easily</p>
      </div>

      <div class="converter-card">
        <div class="top-row">
          <div class="from-box">
            <label for="amount-from">From</label>
            <input type="number" id="amount-from" placeholder="Enter amount" />
            <select id="from-currency"></select>
          </div>

          <button id="swap-btn">⇄</button>

          <div class="to-box">
            <label for="amount-to">To</label>
            <input type="number" id="amount-to" placeholder="Enter amount" />
            <select id="to-currency"></select>
          </div>
        </div>

        <div class="bottom-row">
          <div class="result-info">
            <p id="converted-result">1.00 EUR = 7.46 DKK</p>
            <p id="rate-info">Mid-market rate</p>
          </div>
        </div>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
