<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="functions.css" />
    <title>Functions Homework</title>
  </head>
  <body>
    <h1>Functions Homework</h1>
    <div class="buttons">
      <button id="btn1" class="flower-btn">Exercise 1</button>
      <button id="btn2" class="flower-btn">Exercise 2</button>
      <button id="btn3" class="flower-btn">Earth & Saturn</button>
      <button id="btn4" class="flower-btn">Log location</button>
      <button id="btn5" class="flower-btn">Run after delay</button>
      <button id="btn6" class="flower-btn">Double click</button>
      <button id="btn7" class="flower-btn">Funny joke</button>
      <button id="btn8" class="flower-btn">Bad joke</button>
      <button id="btn9" class="flower-btn">Clear</button>
    </div>
    <div class="game-box">
      <h2>Fastest Presser Game</h2>
      <label for="game-time">Enter game time (seconds):</label>
      <input type="number" id="game-time" min="1" placeholder="e.g. 5" />
      <button id="start-game" class="flower-btn">Start Game!</button>
      <div class="score-board">
        <p>S presses: <span id="count-s">0</span></p>
        <p>L presses: <span id="count-l">0</span></p>
      </div>
      <p id="game-status">Press start to begin</p>
      <p id="winner"></p>
    </div>
    <h2>Output</h2>
    <div id="output"></div>
    <script src="functions.js"></script>
  </body>
</html>
